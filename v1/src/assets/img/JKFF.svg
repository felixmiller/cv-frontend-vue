<svg xmlns="http://www.w3.org/2000/svg" width="50" height="50">
    <rect x="7" y="3" width="34" height="44" fill="#fff" fill-opacity=".8" stroke="#000" stroke-width="3" stroke-miterlimit="10"/>
    <!-- Clock triangle -->
    <path fill="none" stroke="#000" stroke-width="2" stroke-miterlimit="10" d="M7 20 L13 25 L7 30"/>
    <!-- Input labels -->
    <text font-family="Raleway" font-size="11" fill="#000" x="11" y="13" dominant-baseline="middle">J</text>
    <text font-family="Raleway" font-size="11" fill="#000" x="15" y="25" dominant-baseline="middle">C</text>
    <text font-family="Raleway" font-size="11" fill="#000" x="11" y="37" dominant-baseline="middle">K</text>
    <!-- Q label -->
    <text font-family="Raleway" font-size="11" fill="#000" x="39" y="13" text-anchor="end" dominant-baseline="middle">Q</text>
    <!-- Qn label + overbar -->
    <text font-family="Raleway" font-size="11" fill="#000" x="36" y="39" text-anchor="end" dominant-baseline="middle">Q</text>
    <line x1="29" y1="33" x2="36" y2="33" stroke="#000" stroke-width="1"/>
    <!-- Qn bubble -->
    <circle cx="41" cy="39" r="3" fill="#fff" stroke="#000" stroke-width="1.5"/>
    <!-- Port dots -->
    <circle cx="4" cy="13" r="3" fill="green"/>
    <circle cx="4" cy="25" r="3" fill="green"/>
    <circle cx="4" cy="37" r="3" fill="green"/>
    <circle cx="46" cy="13" r="3" fill="green"/>
    <circle cx="46" cy="39" r="3" fill="green"/>
</svg>
