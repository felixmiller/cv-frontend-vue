<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Outer border -->
  <rect x="5" y="5" width="90" height="90" fill="none" stroke="black" stroke-width="2"/>
  <!-- CLB grid (2x2) -->
  <rect x="15" y="15" width="25" height="25" fill="none" stroke="black" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="60" y="15" width="25" height="25" fill="none" stroke="black" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="15" y="60" width="25" height="25" fill="none" stroke="black" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="60" y="60" width="25" height="25" fill="none" stroke="black" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Switch boxes -->
  <rect x="44" y="44" width="12" height="12" fill="white" stroke="black" stroke-width="0.8"/>
  <!-- Label -->
  <text x="50" y="98" text-anchor="middle" font-size="10" font-family="sans-serif">FPGA</text>
</svg>
